# ═══════════════════════════════════════════════════════════════
# nginx reverse proxy — يوميّة (Yawmia)
# ═══════════════════════════════════════════════════════════════
# Usage: sudo cp deploy/nginx.conf /etc/nginx/sites-available/yawmia
#        sudo ln -s /etc/nginx/sites-available/yawmia /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name yowmia.com www.yowmia.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yowmia.com www.yowmia.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/yowmia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yowmia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Max body size (4MB — matches bodyParser limit for verification images)
    client_max_body_size 4m;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE endpoint — disable buffering for real-time streaming
    location /api/notifications/stream {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }
}
