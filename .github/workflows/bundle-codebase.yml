name: Bundle Codebase for Review

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CODEBASE_PART*.md'
      - '.github/workflows/bundle-codebase.yml'

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate bundle
        run: node scripts/bundle-for-review.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CODEBASE_PART*.md
          git diff --staged --quiet || git commit -m "Auto-update codebase bundle [skip ci]"
          git push
